name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # No DATABASE_URL, so this exercises the same PGlite path a developer
      # gets on a fresh clone. If migrate or seed break, CI catches it before
      # anyone spends an afternoon on "it works on my machine".
      - name: Migrate and seed a throwaway database
        run: |
          npm run db:migrate
          npm run db:seed

      - name: Build
        run: npm run build
